[build]
  functions = "functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[redirects]]
  from = "/"
  to   = "/indexit.html"
  status = 200

[[redirects]]
  from = "/topline"
  to   = "/toplineit.html"
  status = 200

[[redirects]]
  from = "/underperformers"
  to   = "/underperformersit.html"
  status = 200
