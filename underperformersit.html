<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Island Time — Underperformer Report (v8)</title>
<meta name="build" content="v8-2026-05-10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f2f4f8;
    --sur:#fff;
    --sur2:#f0f2f6;
    --bd:#e2e6ee;
    --bd2:#d6dbe5;
    --tx:#0b1220;
    --mu:#5b6577;
    --mu2:#8a93a4;
    --ac:#2563eb;
    --ac2:#dbeafe;
    --ac3:#eff6ff;
    --up:#15803d;
    --upbg:#dcfce7;
    --dn:#b91c1c;
    --dnbg:#fee2e2;
    --wn:#b45309;
    --wnbg:#fef3c7;
    --font-d:"Syne",sans-serif;
    --font-m:"DM Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--tx);font-family:var(--font-m);font-size:13px;line-height:1.4}
  body{padding:18px 22px 60px;min-height:100vh}
  a{color:var(--ac);text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ── HEADER ────────────────────────────────────────────────── */
  .hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bd)}
  .hdr h1{font-family:var(--font-d);font-weight:800;font-size:1.8rem;letter-spacing:-.02em;line-height:1}
  .hdr .sub{font-size:.7rem;color:var(--mu);margin-top:6px;text-transform:uppercase;letter-spacing:.08em}
  .hdr-meta{text-align:right;font-size:.65rem;color:var(--mu);text-transform:uppercase;letter-spacing:.08em}
  .hdr-meta b{font-family:var(--font-d);font-size:.95rem;color:var(--tx);font-weight:700;letter-spacing:0;text-transform:none;display:block;margin-top:2px}

  /* ── TABS ──────────────────────────────────────────────────── */
  .tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--bd)}
  .tab{padding:10px 18px;font-family:var(--font-d);font-weight:600;font-size:.8rem;color:var(--mu);letter-spacing:.02em;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
  .tab:hover{color:var(--tx)}
  .tab.act{color:var(--ac);border-bottom-color:var(--ac)}

  /* ── SEVERITY STRIP ────────────────────────────────────────── */
  .sev-strip{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .sev-pill{padding:6px 14px;border-radius:6px;font-size:.7rem;font-weight:500;background:var(--sur);border:1px solid var(--bd);color:var(--mu);transition:all .15s;font-family:var(--font-d)}
  .sev-pill:hover{border-color:var(--bd2)}
  .sev-pill.act{color:var(--tx);border-color:var(--ac);background:var(--ac3)}
  .sev-pill .ct{font-family:var(--font-m);font-size:.65rem;color:var(--mu);margin-left:6px}
  .sev-pill.act .ct{color:var(--ac)}

  /* ── MONTH TOGGLE (Tab 2/3) ───────────────────────────────── */
  .month-toggle{display:flex;gap:4px;margin-bottom:12px}
  .mt-btn{padding:6px 16px;background:var(--sur);border:1px solid var(--bd);border-radius:6px;font-family:var(--font-d);font-weight:600;font-size:.72rem;color:var(--mu);letter-spacing:.04em}
  .mt-btn:hover{border-color:var(--bd2)}
  .mt-btn.act{background:var(--ac);border-color:var(--ac);color:#fff}

  /* ── SCORECARDS ───────────────────────────────────────────── */
  .scards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
  .sc{background:var(--sur);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;position:relative;cursor:pointer;transition:all .15s}
  .sc:hover{border-color:var(--bd2)}
  .sc.act{border-color:var(--ac);background:var(--ac3)}
  .sc .lbl{font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:500}
  .sc .val{font-family:var(--font-d);font-weight:700;font-size:1.5rem;letter-spacing:-.02em;line-height:1.1}
  .sc .pair{display:flex;gap:10px;margin-top:6px;font-size:.62rem;color:var(--mu)}
  .sc .pair span b{font-family:var(--font-d);font-weight:600;color:var(--tx);font-size:.7rem}
  .sc .x{position:absolute;top:6px;right:8px;font-size:.7rem;color:var(--ac);opacity:0;transition:opacity .15s;width:14px;height:14px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;line-height:1}
  .sc.act .x{opacity:1}
  .sc.act:hover .x{transform:scale(1.1)}

  /* ── FILTER SUMMARY BAR ───────────────────────────────────── */
  .fsum{background:var(--ac3);border:1px solid var(--ac);border-radius:6px;padding:8px 14px;margin-bottom:10px;display:flex;gap:18px;font-size:.72rem;color:var(--ac);align-items:center;flex-wrap:wrap}
  .fsum b{font-family:var(--font-d);font-weight:700;color:var(--tx);font-size:.78rem}
  .fsum .ttl{font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:.62rem}
  .fsum .clr{margin-left:auto;cursor:pointer;font-size:.65rem;background:var(--ac);color:#fff;padding:3px 9px;border-radius:4px;font-family:var(--font-d);font-weight:600}

  /* ── FILTERS ─────────────────────────────────────────────── */
  .filters{background:var(--sur);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:10px;display:flex;flex-direction:column;gap:6px}
  .fgrp{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .fgrp .lab{font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-right:4px;white-space:nowrap;min-width:52px}
  .fpill{padding:4px 9px;border-radius:5px;font-size:.65rem;background:var(--sur2);border:1px solid transparent;color:var(--mu);font-family:var(--font-m);transition:all .15s}
  .fpill:hover{color:var(--tx)}
  .fpill.act{background:var(--ac);color:#fff}
  .fpill.act:hover{color:#fff}

  /* ── COLUMN PICKER ────────────────────────────────────────── */
  .colpick{background:var(--sur);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px}
  .cprow{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .cprow .lab{font-size:.58rem;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-right:4px}
  .cpfix{padding:3px 9px;border-radius:4px;font-size:.62rem;background:#eef0f4;color:var(--mu);font-family:var(--font-m);border:1px dashed var(--bd2)}
  .cpopt{padding:3px 9px;border-radius:4px;font-size:.62rem;background:var(--sur2);color:var(--mu);font-family:var(--font-m);border:1px solid transparent;transition:all .15s}
  .cpopt:hover{color:var(--tx)}
  .cpopt.act{background:var(--ac);color:#fff}
  .cppre{padding:4px 11px;border-radius:5px;font-size:.65rem;background:var(--sur2);color:var(--tx);font-family:var(--font-d);font-weight:600;letter-spacing:.04em;border:1px solid var(--bd);transition:all .15s}
  .cppre:hover{border-color:var(--bd2)}
  .cppre.act{background:var(--tx);color:var(--sur);border-color:var(--tx)}

  /* ── TABLE ────────────────────────────────────────────────── */
  .twrap{background:var(--sur);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
  /* always-visible horizontal scrollbar */
  .tscroll{overflow-x:scroll;overflow-y:auto;max-height:calc(100vh - 480px);min-height:300px;scrollbar-width:auto}
  .tscroll::-webkit-scrollbar{height:14px;width:10px}
  .tscroll::-webkit-scrollbar-track{background:var(--sur2);border-top:1px solid var(--bd)}
  .tscroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:7px;border:2px solid var(--sur2)}
  .tscroll::-webkit-scrollbar-thumb:hover{background:var(--mu2)}
  table{width:max-content;min-width:100%;border-collapse:separate;border-spacing:0;font-size:.72rem}
  thead th{position:sticky;top:0;background:var(--sur2);font-family:var(--font-d);font-weight:600;font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;padding:9px 10px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;cursor:pointer;user-select:none;z-index:2;position:relative}
  thead th:hover{color:var(--tx)}
  thead th .arr{margin-left:4px;font-size:.55rem;opacity:.5}
  thead th.srt .arr{opacity:1;color:var(--ac)}
  /* drag-to-reorder */
  thead th[draggable="true"]{cursor:grab}
  thead th[draggable="true"]:active{cursor:grabbing}
  thead th.drag-over-left{box-shadow:inset 3px 0 0 var(--ac)}
  thead th.drag-over-right{box-shadow:inset -3px 0 0 var(--ac)}
  thead th.dragging{opacity:.4}
  td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle;font-family:var(--font-m);font-size:.7rem;white-space:nowrap}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--ac3)}
  tbody tr:last-child td{border-bottom:none}
  td.gdiv,th.gdiv{border-left:1px solid var(--bd)}
  td.unit{font-family:var(--font-d);font-weight:600;color:var(--tx);font-size:.78rem}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  td.num b{font-family:var(--font-d);font-weight:600}
  .pos{color:var(--up)}
  .neg{color:var(--dn)}
  .neu{color:var(--mu)}

  /* badges */
  .sev{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.58rem;font-weight:600;letter-spacing:.04em;font-family:var(--font-d);text-transform:uppercase}
  .sev-Severe{color:#991b1b;background:#fee2e2}
  .sev-Significant{color:#92400e;background:#fef3c7}
  .sev-Moderate{color:#1e40af;background:#dbeafe}
  .sev-Minor{color:#374151;background:#f3f4f6}

  .ldg-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}

  .fbadge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:.52rem;font-weight:600;letter-spacing:.02em;color:#fff;margin-right:3px;font-family:var(--font-m);text-transform:uppercase}
  .fb-ADR-Creep{background:#c2410c}
  .fb-OCC-Collapse{background:#b45309}
  .fb-Double-Down{background:#7c2d12}
  .fb-WH-Over-EOM{background:#9f1239}
  .fb-WH-Under-EOM{background:#1d4ed8}
  .fb-Rate-to-Recover-Unlikely{background:#6d28d9}
  .fcount{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:.62rem;font-weight:700;font-family:var(--font-d);margin-right:6px;vertical-align:middle}
  .fc-0{background:#f3f4f6;color:var(--mu)}
  .fc-1{background:#fef3c7;color:#92400e}
  .fc-2{background:#fee2e2;color:#991b1b}
  .fc-3{background:#991b1b;color:#fff}

  .tags-pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.55rem;background:var(--sur2);color:var(--mu);margin-right:3px;border:1px solid var(--bd)}

  .empty{padding:40px 20px;text-align:center;color:var(--mu);font-size:.85rem}

  /* footer */
  .ftr{margin-top:14px;font-size:.6rem;color:var(--mu2);text-align:center;text-transform:uppercase;letter-spacing:.1em}

  /* small helpers */
  .pn-pos{color:var(--up);font-weight:600}
  .pn-neg{color:var(--dn);font-weight:600}
  .pn-neu{color:var(--mu)}
  .stk{display:flex;flex-direction:column;gap:1px;font-size:.64rem;line-height:1.3}
  .stk .l1{font-family:var(--font-d);font-weight:600;font-size:.7rem}
  .stk .l2{color:var(--mu);font-size:.58rem}

  @media (max-width:1180px){
    .scards{grid-template-columns:repeat(3,1fr)}
  }
  @media (max-width:760px){
    .scards{grid-template-columns:repeat(2,1fr)}
    body{padding:12px}
  }

  /* ── UNIT DETAIL MODAL ────────────────────────────────────── */
  .modal-bd{position:fixed;inset:0;background:rgba(11,18,32,.55);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .18s}
  .modal-bd.open{opacity:1;pointer-events:auto}
  .modal{background:var(--sur);border:1px solid var(--bd);border-radius:12px;width:min(880px,92vw);max-height:88vh;overflow:auto;box-shadow:0 30px 60px -20px rgba(11,18,32,.45);transform:translateY(8px);transition:transform .18s;padding:22px 26px 24px}
  .modal-bd.open .modal{transform:translateY(0)}
  .mh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--bd);padding-bottom:14px;margin-bottom:16px;gap:18px}
  .mh-l h2{font-family:var(--font-d);font-weight:800;font-size:1.5rem;letter-spacing:-.02em;line-height:1;margin-bottom:6px}
  .mh-l .mh-meta{font-size:.65rem;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:4px}
  .mh-l .mh-meta b{color:var(--tx);font-family:var(--font-d);font-weight:600}
  .mh-r{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .mclose{font-size:1.4rem;color:var(--mu);background:var(--sur2);width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
  .mclose:hover{background:var(--bd);color:var(--tx)}
  .m-month{display:flex;gap:3px;border:1px solid var(--bd);border-radius:6px;padding:2px}
  .m-month button{padding:5px 11px;font-family:var(--font-d);font-weight:600;font-size:.66rem;color:var(--mu);border-radius:4px;letter-spacing:.04em}
  .m-month button.act{background:var(--ac);color:#fff}
  .m-month button:not(.act):hover{background:var(--sur2);color:var(--tx)}

  .mkpi{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
  .kpi-sq{background:var(--sur2);border:1px solid var(--bd);border-radius:10px;padding:18px 18px 16px;position:relative;min-height:130px;display:flex;flex-direction:column;justify-content:space-between}
  .kpi-sq .kpi-lbl{font-size:.62rem;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:8px}
  .kpi-sq .kpi-big{font-family:var(--font-d);font-weight:700;font-size:2.0rem;letter-spacing:-.02em;line-height:1.05;margin-bottom:2px}
  .kpi-sq .kpi-big.split{display:flex;align-items:baseline;gap:10px;font-size:1.6rem}
  .kpi-sq .kpi-big.split .vs{font-family:var(--font-m);font-size:.7rem;color:var(--mu);font-weight:500;letter-spacing:.04em}
  .kpi-sq .kpi-sub{font-size:.68rem;color:var(--mu);font-family:var(--font-m);line-height:1.5;margin-top:8px}
  .kpi-sq .kpi-sub b{font-family:var(--font-d);font-weight:600;color:var(--tx)}
  .kpi-sq .kpi-sub .sep{color:var(--bd2);margin:0 8px}
  .kpi-sq .kpi-tag{position:absolute;top:14px;right:14px;font-size:.55rem;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.04em;font-family:var(--font-d);text-transform:uppercase}
  .kpi-sq .kpi-tag.up{background:#dcfce7;color:#166534}
  .kpi-sq .kpi-tag.dn{background:#fee2e2;color:#991b1b}
  .kpi-sq .kpi-tag.neu{background:#f3f4f6;color:#6b7280}

  .m-explain{background:#f8fafc;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:.7rem;color:var(--mu);line-height:1.55}
  .m-explain b{font-family:var(--font-d);font-weight:600;color:var(--tx)}
  .m-explain code{background:var(--sur);padding:1px 5px;border-radius:3px;font-family:var(--font-m);font-size:.66rem;color:var(--tx);border:1px solid var(--bd)}

  .m-flagstrip{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}

  .m-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.7rem;background:var(--sur);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
  .m-table th{background:var(--sur2);font-family:var(--font-d);font-weight:600;font-size:.58rem;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;padding:8px 10px;text-align:left;border-bottom:1px solid var(--bd)}
  .m-table td{padding:7px 10px;border-bottom:1px solid var(--bd);font-family:var(--font-m);font-size:.7rem}
  .m-table tr:last-child td{border-bottom:none}
  .m-table .lbl{color:var(--mu);width:38%}
  .m-section-title{font-family:var(--font-d);font-weight:700;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin:6px 0 8px}

  /* Export button */
  .export-btn{padding:7px 14px;background:#15803d;color:#fff;border:1px solid #166534;border-radius:6px;font-family:var(--font-d);font-weight:600;font-size:.7rem;letter-spacing:.04em;cursor:pointer;transition:all .15s}
  .export-btn:hover{background:#166534;transform:translateY(-1px);box-shadow:0 4px 12px -4px rgba(20,128,61,.4)}

  /* req-rate help icon in column header */
  .help-icon{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:var(--bd2);color:var(--sur);font-size:.55rem;font-weight:700;margin-left:5px;cursor:help;font-family:var(--font-m);vertical-align:middle}
  .help-icon:hover{background:var(--ac)}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Island Time — Underperformer Report</h1>
    <div class="sub">Jan–Apr Damage · May–Aug Forward Pace · Rate Positioning</div>
  </div>
  <div class="hdr-meta">
    Generated
    <b id="genDate"></b>
  </div>
</div>

<div class="tabs">
  <button class="tab act" data-tab="damage">1 · Damage (Jan–Apr)</button>
  <button class="tab" data-tab="forward">2 · Forward Pace (May–Aug)</button>
  <button class="tab" data-tab="rate">3 · Rate Positioning (May–Aug)</button>
</div>

<div class="sev-strip" id="sevStrip"></div>

<div id="monthToggle" class="month-toggle" style="display:none"></div>

<div class="scards" id="scards"></div>

<div class="fsum" id="fsum" style="display:none"></div>

<div class="filters" id="filters"></div>

<div class="actions" style="display:flex;justify-content:flex-end;padding:6px 0 0 0;gap:8px">
  <button id="exportXlsx" class="export-btn">⬇ Export to Excel</button>
</div>
<div class="colpick" id="colpick"></div>

<div class="twrap">
  <div class="tscroll">
    <table id="tbl">
      <thead><tr id="thr"></tr></thead>
      <tbody id="tbd"></tbody>
    </table>
  </div>
</div>

<div class="ftr">Island Time Underperformer Report · v8 · Year-corrected · Excel export · Pill filters · GN col · Req Rate on all tabs</div>

<!-- Unit Detail Modal -->
<div class="modal-bd" id="mbd">
  <div class="modal" id="mdl">
    <div id="mContent"></div>
  </div>
</div>

<script>
/* ──────────────────────────────────────────────────────────────────────

/* ──────────────────────────────────────────────────────────────────────
   FILTERED UNIT LIST (after severity, bedrooms, tags, flags, scorecard)
   ────────────────────────────────────────────────────────────────────── */
function getMonthData(u){
  return state.tab==='damage' ? null : u.fwd_months.find(m=>m.month===state.month);
}

function applyTableFilters(){
  return UNITS.filter(u=>{
    if(state.severity!=='all' && u.severity!==state.severity) return false;
    if(state.bedrooms.size>0 && !state.bedrooms.has(u.bedrooms)) return false;
    if(state.tags.size>0){
      const ut = new Set(u.tags||[]);
      let any=false; state.tags.forEach(t=>{ if(ut.has(t)) any=true; });
      if(!any) return false;
    }

    // flag filter applies to current tab context
    const m = getMonthData(u);
    const flagSrc = m ? m.flags : (u.all_flags||[]);
    const flagCount = m ? m.flag_count : (u.total_flag_count||0);
    if(state.flagFilter!=='all' && !flagSrc.includes(state.flagFilter)) return false;
    if(state.minFlags>0 && flagCount<state.minFlags) return false;

    // WH Open / Req Rate / GN pill filters
    if(state.whFilter !== 'all'){
      let owd, owe;
      if(state.tab === 'damage'){
        owd = (u.fwd_months||[]).reduce((s,fm)=>s+(fm.wh_open_wd||0),0);
        owe = (u.fwd_months||[]).reduce((s,fm)=>s+(fm.wh_open_we||0),0);
      } else {
        owd = m? m.wh_open_wd : null;
        owe = m? m.wh_open_we : null;
      }
      if(state.whFilter === 'has_open_wd' && !(owd > 0)) return false;
      if(state.whFilter === 'full_wd'     && !(owd === 0)) return false;
      if(state.whFilter === 'has_open_we' && !(owe > 0)) return false;
      if(state.whFilter === 'full_we'     && !(owe === 0)) return false;
    }
    if(state.reqFilter !== 'all'){
      let hasReq;
      if(state.tab === 'damage'){
        hasReq = (u.fwd_months||[]).some(fm=>fm.req_rate_eom != null && fm.req_rate_eom > 0);
      } else {
        const rv = m? m.req_rate_eom : null;
        hasReq = (rv != null && rv > 0);
      }
      if(state.reqFilter === 'has_req' && !hasReq) return false;
      if(state.reqFilter === 'no_req'  && hasReq)  return false;
    }
    if(state.gnFilter !== 'all'){
      const gv = state.tab === 'damage' ? (u.ana_gn_cy||0) : ((m && m.gn_cy)||0);
      if(state.gnFilter === 'has_gn'  && !(gv > 0)) return false;
      if(state.gnFilter === 'zero_gn' && !(gv === 0)) return false;
    }

    // Scorecard filter
    if(state.scorecard) {
      if(!matchesScorecardFilter(u, m, state.scorecard)) return false;
    }
    return true;
  });
}

function matchesScorecardFilter(u, m, sc){
  // Damage tab references ana_*
  // Forward + Rate reference m.*
  switch(sc){
    case 'rev_diff':       return (m? m.rev_diff : u.ana_rev_diff) < 0;
    case 'occ_diff':       return (m? m.occ_diff : u.ana_occ_diff) < 0;
    case 'adr_diff_creep': {
      const ad = m? m.adr_diff : u.ana_adr_diff;
      const rd = m? m.rev_diff : u.ana_rev_diff;
      return ad>0 && rd<0;
    }
    case 'flags':          return (m? m.flag_count : u.total_flag_count) > 0;
    case 'net_pos':        return u.net_position < 0;
    case 'ahead_sdly':     return m && m.rev_diff!=null && m.rev_diff > 0;
    case 'eom_rev_target': return m && m.eom_rev != null;
    case 'req_rate_eom':   return m && m.req_rate_eom != null && m.req_rate_eom > 0;
    case 'wh_over_eom':    return m && (m.flags||[]).includes('WH Over EOM');
    case 'priced_ok':      return m && ((m.req_rate_eom===0) || (m.wh_blended!=null && m.req_rate_eom!=null && m.wh_blended >= m.req_rate_eom));
    default: return true;
  }
}

/* ──────────────────────────────────────────────────────────────────────
   SCORECARDS — FROZEN: always all 57 underperformers
   ────────────────────────────────────────────────────────────────────── */
function avg(arr){ const v=arr.filter(x=>x!=null && !isNaN(x)); return v.length? v.reduce((a,b)=>a+b,0)/v.length : null; }
function sum(arr){ return arr.filter(x=>x!=null && !isNaN(x)).reduce((a,b)=>a+b,0); }

function renderScorecards(){
  const el = document.getElementById('scards');
  let cards;
  if(state.tab==='damage'){
    cards = damageScorecards();
  } else if(state.tab==='forward'){
    cards = forwardScorecards();
  } else {
    cards = rateScorecards();
  }
  el.innerHTML = cards.map(c=>`
    <div class="sc ${state.scorecard===c.id?'act':''}" data-sc="${c.id}">
      <div class="x">×</div>
      <div class="lbl">${c.lbl}</div>
      <div class="val ${c.cls||''}">${c.val}</div>
      <div class="pair">${c.pair||''}</div>
    </div>`).join('');
  el.querySelectorAll('.sc').forEach(s=>{
    s.onclick = ()=>{
      state.scorecard = state.scorecard===s.dataset.sc ? null : s.dataset.sc;
      renderAll();
    };
  });
}

function damageScorecards(){
  const totalGap = sum(UNITS.map(u=>u.ana_rev_diff));
  const cyAvg   = avg(UNITS.map(u=>u.ana_occ_cy));
  const sdlyAvg = avg(UNITS.map(u=>u.ana_occ_sdly));
  const occDiff = (cyAvg!=null && sdlyAvg!=null) ? cyAvg-sdlyAvg : null;
  const adrCy   = avg(UNITS.map(u=>u.ana_adr_cy));
  const adrSdly = avg(UNITS.map(u=>u.ana_adr_sdly));
  const adrDiff = (adrCy!=null && adrSdly!=null) ? adrCy-adrSdly : null;
  const totalFlags = sum(UNITS.map(u=>u.total_flag_count));
  const netNeg  = UNITS.filter(u=>u.net_position<0).length;
  const netSum  = sum(UNITS.map(u=>u.net_position));
  return [
    {id:'rev_diff', lbl:'Revenue Gap (Jan–Apr)',
     val:fmtSign$(totalGap), cls:cls(totalGap),
     pair:`<span><b>${UNITS.length}</b> units</span><span>click to filter</span>`},
    {id:'occ_diff', lbl:'Avg OCC% vs SDLY',
     val:fmtSignPct(occDiff), cls:cls(occDiff),
     pair:`<span>CY <b>${fmtPct(cyAvg)}</b></span><span>LY <b>${fmtPct(sdlyAvg)}</b></span>`},
    {id:'adr_diff_creep', lbl:'Avg ADR vs SDLY',
     val:adrDiff==null?'—':((adrDiff>=0?'+':'-')+'$'+Math.abs(Math.round(adrDiff))),
     cls:cls(adrDiff),
     pair:`<span>CY <b>${fmtRate(adrCy)}</b></span><span>LY <b>${fmtRate(adrSdly)}</b></span>`},
    {id:'flags', lbl:'Total Flags (Forward)',
     val:fmtNum(totalFlags), cls:'',
     pair:`<span>across <b>${UNITS.filter(u=>u.total_flag_count>0).length}</b> units</span>`},
    {id:'net_pos', lbl:'Net Position',
     val:fmtSign$(netSum), cls:cls(netSum),
     pair:`<span><b>${netNeg}</b> still negative</span><span>${UNITS.length-netNeg} recovered</span>`},
  ];
}

function forwardScorecards(){
  // Use current month
  const m = state.month;
  const ms = UNITS.map(u=>u.fwd_months.find(x=>x.month===m)).filter(x=>x);
  const revCy   = sum(ms.map(x=>x.rev_cy));
  const revSdly = sum(ms.map(x=>x.rev_sdly));
  const revDiff = revCy - revSdly;
  const occCy   = avg(ms.map(x=>x.occ_cy));
  const occSdly = avg(ms.map(x=>x.occ_sdly));
  const occDiff = (occCy!=null && occSdly!=null) ? occCy-occSdly : null;
  const adrCy   = avg(ms.map(x=>x.adr_cy));
  const adrSdly = avg(ms.map(x=>x.adr_sdly));
  const adrDiff = (adrCy!=null && adrSdly!=null) ? adrCy-adrSdly : null;
  const openTot = sum(ms.map(x=>x.open_nts));
  const ahead   = ms.filter(x=>x.rev_diff!=null && x.rev_diff>0).length;
  return [
    {id:'rev_diff', lbl:`${m} Rev vs SDLY`,
     val:fmtSign$(revDiff), cls:cls(revDiff),
     pair:`<span>CY <b>${fmt$0(revCy)}</b></span><span>LY <b>${fmt$0(revSdly)}</b></span>`},
    {id:'occ_diff', lbl:`${m} Avg OCC%`,
     val:fmtSignPct(occDiff), cls:cls(occDiff),
     pair:`<span>CY <b>${fmtPct(occCy)}</b></span><span>LY <b>${fmtPct(occSdly)}</b></span>`},
    {id:'adr_diff_creep', lbl:`${m} Avg ADR`,
     val:adrDiff==null?'—':((adrDiff>=0?'+':'-')+'$'+Math.abs(Math.round(adrDiff))),
     cls:cls(adrDiff),
     pair:`<span>CY <b>${fmtRate(adrCy)}</b></span><span>LY <b>${fmtRate(adrSdly)}</b></span>`},
    {id:'req_rate_eom', lbl:`${m} Open Nights`,
     val:fmtNum(openTot), cls:'',
     pair:`<span>across <b>${ms.filter(x=>x.open_nts>0).length}</b> units</span>`},
    {id:'ahead_sdly', lbl:`${m} Units Ahead of SDLY`,
     val:fmtNum(ahead), cls:'',
     pair:`<span><b>${UNITS.length-ahead}</b> still behind</span>`},
  ];
}

function rateScorecards(){
  const m = state.month;
  const ms = UNITS.map(u=>u.fwd_months.find(x=>x.month===m)).filter(x=>x);
  const eomRevTot = sum(ms.map(x=>x.eom_rev));
  const cyBookedTot = sum(ms.map(x=>x.rev_cy));
  const reqRates = ms.map(x=>x.req_rate_eom).filter(v=>v!=null && v>0);
  const reqMed = reqRates.length ? reqRates.sort((a,b)=>a-b)[Math.floor(reqRates.length/2)] : null;
  const whBlend = avg(ms.map(x=>x.wh_blended));
  const overEom = ms.filter(x=>(x.flags||[]).includes('WH Over EOM')).length;
  const pricedOk = ms.filter(x=>(x.req_rate_eom===0) || (x.wh_blended!=null && x.req_rate_eom!=null && x.wh_blended >= x.req_rate_eom)).length;
  return [
    {id:'eom_rev_target', lbl:`${m} EOM Rev Target`,
     val:fmt$0(eomRevTot), cls:'',
     pair:`<span>booked <b>${fmt$0(cyBookedTot)}</b></span><span>${eomRevTot? Math.round(cyBookedTot/eomRevTot*100):0}% complete</span>`},
    {id:'req_rate_eom', lbl:`${m} Req Rate (median)`,
     val:reqMed==null?'—':fmtRate(reqMed), cls:'',
     pair:`<span><b>${reqRates.length}</b> units need rate</span>`},
    {id:'rev_diff', lbl:`${m} Avg WH Listed`,
     val:whBlend==null?'—':fmtRate(whBlend), cls:'',
     pair:`<span>across <b>${ms.filter(x=>x.wh_blended).length}</b> units</span>`},
    {id:'priced_ok', lbl:`${m} Priced OK or Ahead`,
     val:fmtNum(pricedOk), cls:pricedOk>0?'pos':'',
     pair:`<span>of <b>${ms.length}</b> units</span>`},
    {id:'wh_over_eom', lbl:`${m} WH Over EOM ADR`,
     val:fmtNum(overEom), cls:overEom>0?'neg':'',
     pair:`<span>flagged units</span>`},
  ];
}

/* ──────────────────────────────────────────────────────────────────────
   TABLE
   ────────────────────────────────────────────────────────────────────── */
function getActiveOptionalCols(){
  const avail = TAB_COL_AVAILABILITY[state.tab];
  const active = id => COLS[id] && state.cols.has(id) && avail.includes(id);

  // Default order, derived from group order
  const defaultOrder = [];
  COL_GROUPS_ORDER.forEach(g=>{
    Object.entries(COLS).forEach(([id,c])=>{
      if(c.grp===g && active(id)) defaultOrder.push(id);
    });
  });

  if (!state.colOrder) return defaultOrder;

  // Honor stored order, drop ids that aren't currently active, append new
  // active ids that haven't been seen yet (in their default position).
  const stored = state.colOrder.filter(active);
  const storedSet = new Set(stored);
  const appended = defaultOrder.filter(id => !storedSet.has(id));
  return [...stored, ...appended];
}

function renderTable(){
  const filtered = applyTableFilters();
  // Sort
  const sorted = [...filtered].sort((a,b)=>{
    const ma = getMonthData(a), mb = getMonthData(b);
    let av, bv;
    if(state.sortKey==='unit'){ av=a.unit; bv=b.unit; }
    else if(state.sortKey==='bedrooms'){ av=a.bedrooms??-1; bv=b.bedrooms??-1; }
    else if(state.sortKey==='sev_rank'){ av=a.sev_rank; bv=b.sev_rank; }
    else if(COLS[state.sortKey]){
      const k = COLS[state.sortKey].key;
      av = typeof k==='function' ? k(a, ma) : a[k];
      bv = typeof k==='function' ? k(b, mb) : b[k];
    } else {
      av=a[state.sortKey]; bv=b[state.sortKey];
    }
    // Nulls last
    if(av==null && bv==null) return 0;
    if(av==null) return 1;
    if(bv==null) return -1;
    if(typeof av==='string') return state.sortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return state.sortDir==='asc' ? av-bv : bv-av;
  });

  // Header
  const optCols = getActiveOptionalCols();
  const thr = document.getElementById('thr');

  const fixedHeaders = [
    {id:'unit', label:'Unit'},
    {id:'bedrooms', label:'BR'},
    {id:'sev_rank', label:'Severity'},
  ];
  // Fixed headers are NOT draggable (Unit/BR/Severity always anchor the row).
  let thHTML = fixedHeaders.map(h=>`
    <th data-k="${h.id}" class="${state.sortKey===h.id?'srt':''}">${h.label}<span class="arr">${state.sortKey===h.id?(state.sortDir==='asc'?'▲':'▼'):'▲▼'}</span></th>
  `).join('');

  let prevGroup = null;
  optCols.forEach(id=>{
    const c = COLS[id];
    const divider = c.grp !== prevGroup && GROUP_DIVIDER_FIRST.has(c.grp) ? 'gdiv' : '';
    const help = id === 'req_rate'
      ? `<span class="help-icon" title="Required nightly rate to hit last year's EOM revenue. Formula: (LY EOM revenue − CY booked revenue) / open nights. 'Ahead' means CY revenue already exceeds LY EOM.">?</span>`
      : '';
    thHTML += `<th draggable="true" data-col-id="${id}" data-k="${id}" class="${divider} ${state.sortKey===id?'srt':''}">${c.label}${help}<span class="arr">${state.sortKey===id?(state.sortDir==='asc'?'▲':'▼'):'▲▼'}</span></th>`;
    prevGroup = c.grp;
  });
  thr.innerHTML = thHTML;

  // Sort handlers (suppressed during drag)
  document.querySelectorAll('#thr th').forEach(th=>{
    th.addEventListener('click', (e)=>{
      if (th.dataset.suppressClick === '1') {
        th.dataset.suppressClick = '0';
        return;
      }
      const k = th.dataset.k;
      if(state.sortKey===k){
        state.sortDir = state.sortDir==='asc'?'desc':'asc';
      } else {
        state.sortKey = k;
        state.sortDir = (k==='unit') ? 'asc' : 'asc';
      }
      renderTable();
    });
  });

  // Drag-to-reorder handlers (only optional columns)
  attachDragHandlers();

  // Body
  const tbd = document.getElementById('tbd');
  if(sorted.length===0){
    tbd.innerHTML = `<tr><td colspan="${3+optCols.length}" class="empty">No units match the current filters.</td></tr>`;
  } else {
    tbd.innerHTML = sorted.map(u=>{
      const m = getMonthData(u);
      let row = FIXED_RENDER.unit.render(u) + FIXED_RENDER.br.render(u) + FIXED_RENDER.sev.render(u);
      let prevGroupRow = null;
      optCols.forEach(id=>{
        const c = COLS[id];
        const dvr = c.grp!==prevGroupRow && GROUP_DIVIDER_FIRST.has(c.grp) ? 'gdiv' : '';
        const isNum = ['Revenue','OCC','ADR','Ops','Rate','Flags'].includes(c.grp) && id!=='flags';
        const cls = isNum ? 'num' : '';
        row += `<td class="${cls} ${dvr}">${c.render(u, m)}</td>`;
        prevGroupRow = c.grp;
      });
      return `<tr data-unit="${u.unit}">${row}</tr>`;
    }).join('');
    // Row click → unit popup
    tbd.querySelectorAll('tr[data-unit]').forEach(tr=>{
      tr.onclick = ()=>openUnitPopup(tr.dataset.unit);
    });
  }

  renderFilterSummary(filtered);
}

/* ──────────────────────────────────────────────────────────────────────
   DRAG-TO-REORDER
   ────────────────────────────────────────────────────────────────────── */
let _dragSrcId = null;

function attachDragHandlers(){
  const ths = document.querySelectorAll('#thr th[data-col-id]');
  ths.forEach(th=>{
    th.addEventListener('dragstart', (e)=>{
      _dragSrcId = th.dataset.colId;
      th.classList.add('dragging');
      // Suppress sort click after this drag
      th.dataset.suppressClick = '1';
      try { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', _dragSrcId); } catch(_){}
    });
    th.addEventListener('dragend', ()=>{
      th.classList.remove('dragging');
      ths.forEach(x=>x.classList.remove('drag-over-left','drag-over-right'));
      _dragSrcId = null;
    });
    th.addEventListener('dragover', (e)=>{
      e.preventDefault();
      try { e.dataTransfer.dropEffect = 'move'; } catch(_){}
      if (!_dragSrcId || _dragSrcId === th.dataset.colId) return;
      const rect = th.getBoundingClientRect();
      const before = (e.clientX - rect.left) < rect.width / 2;
      th.classList.toggle('drag-over-left', before);
      th.classList.toggle('drag-over-right', !before);
    });
    th.addEventListener('dragleave', ()=>{
      th.classList.remove('drag-over-left','drag-over-right');
    });
    th.addEventListener('drop', (e)=>{
      e.preventDefault();
      const srcId = _dragSrcId;
      const tgtId = th.dataset.colId;
      th.classList.remove('drag-over-left','drag-over-right');
      if (!srcId || srcId === tgtId) return;

      const rect = th.getBoundingClientRect();
      const before = (e.clientX - rect.left) < rect.width / 2;

      // Build new order off current visible columns
      const current = getActiveOptionalCols();
      const next = current.filter(c=>c !== srcId);
      let idx = next.indexOf(tgtId);
      if (!before) idx += 1;
      next.splice(idx, 0, srcId);
      state.colOrder = next;
      state.preset = 'Custom';
      persistColOrder();
      renderColPicker();
      renderTable();
    });
  });
}

/* ──────────────────────────────────────────────────────────────────────

   ────────────────────────────────────────────────────────────────────── */
function openUnitPopup(unitId){
  const u = UNITS.find(x=>x.unit===unitId);
  if (!u) return;
  state.popupUnit = unitId;
  // Default popup month: current state.month if on forward/rate tab, else MAY
  state.popupMonth = (state.tab === 'damage') ? 'MAY' : state.month;
  renderPopup();
  document.getElementById('mbd').classList.add('open');
}

function closeUnitPopup(){
  document.getElementById('mbd').classList.remove('open');
  state.popupUnit = null;
}

function renderPopup(){
  const u = UNITS.find(x=>x.unit===state.popupUnit);
  if (!u) return;
  const m = u.fwd_months.find(x=>x.month===state.popupMonth) || {};

  const sevBadge = u.severity ? `<span class="sev sev-${u.severity}">${u.severity}</span>` : '';
  const ldgC = LDG_DOT[u.primary_ldg] || '#6b7280';
  const ldgChip = `<span style="display:inline-flex;align-items:center;gap:5px"><span class="ldg-dot" style="background:${ldgC}"></span>${u.primary_ldg||'—'}</span>`;
  const tags = (u.tags||[]).slice(0,5).map(t=>`<span class="tags-pill">${t}</span>`).join('');

  // ─── KPI 1: OCC (CY vs SDLY in pp; small line: CY · SDLY values)
  const occ_cy = m.occ_cy, occ_sdly = m.occ_sdly, occ_diff = m.occ_diff;
  const occ_tag = occ_diff==null ? 'neu' : occ_diff>0 ? 'up' : occ_diff<0 ? 'dn' : 'neu';
  const occ_tag_lbl = occ_diff==null ? '—' : (occ_diff>=0?'+':'')+occ_diff.toFixed(1)+' pp';
  const kpi_occ = `
    <div class="kpi-sq">
      <span class="kpi-tag ${occ_tag}">${occ_tag_lbl}</span>
      <div>
        <div class="kpi-lbl">${state.popupMonth} OCC · CY vs SDLY</div>
        <div class="kpi-big split">
          <span class="${cls(occ_diff)}">${fmtSignPct(occ_diff)}</span>
        </div>
      </div>
      <div class="kpi-sub">CY <b>${fmtPct(occ_cy)}</b><span class="sep">·</span>SDLY <b>${fmtPct(occ_sdly)}</b></div>
    </div>`;

  // ─── KPI 2: Required rate vs WH listed (avg)
  const req = m.req_rate_eom;
  const wh = m.wh_blended;
  let rateBig, rateTag, rateTagCls, rateSub;
  if (req == null) {
    rateBig = '<span class="neu">—</span>';
    rateTag = 'No data'; rateTagCls = 'neu';
    rateSub = `WH listed <b>${wh==null?'—':fmtRate(wh)}</b>`;
  } else if (req === 0) {
    rateBig = '<span class="pos">Ahead</span>';
    rateTag = 'AHEAD'; rateTagCls = 'up';
    rateSub = `CY revenue already exceeds LY EOM target<span class="sep">·</span>WH listed <b>${wh==null?'—':fmtRate(wh)}</b>`;
  } else {
    const gap = wh==null ? null : (wh - req);
    rateBig = `<span>${fmtRate(req)}</span>${wh!=null?` <span class="vs">vs</span> <span class="${cls(gap)}">${fmtRate(wh)}</span>`:''}`;
    if (wh == null) { rateTag = 'No WH'; rateTagCls = 'neu'; }
    else if (wh >= req) { rateTag = 'Listed ≥ Req'; rateTagCls = 'up'; }
    else { rateTag = `Short by $${Math.abs(Math.round(gap))}`; rateTagCls = 'dn'; }
    rateSub = `Req <b>${fmtRate(req)}</b><span class="sep">·</span>WH listed <b>${wh==null?'—':fmtRate(wh)}</b>`;
  }
  const kpi_rate = `
    <div class="kpi-sq">
      <span class="kpi-tag ${rateTagCls}">${rateTag}</span>
      <div>
        <div class="kpi-lbl">${state.popupMonth} Rate Needed vs WH Listed</div>
        <div class="kpi-big split">${rateBig}</div>
      </div>
      <div class="kpi-sub">${rateSub}</div>
    </div>`;

  // ─── KPI 3: Open Nights (leaderboard total big; WH WD/WE split small)
  const lb_open = m.open_nts;
  const wh_wd_open = m.wh_open_wd, wh_we_open = m.wh_open_we;
  const wh_total = (wh_wd_open!=null && wh_we_open!=null) ? wh_wd_open + wh_we_open : null;
  const mismatchNote = (lb_open!=null && wh_total!=null && Math.abs(lb_open - wh_total) > 1)
    ? `<span class="sep">·</span><span style="color:var(--wn)">WH says ${wh_total}</span>`
    : '';
  const open_tag_cls = lb_open == null ? 'neu' : lb_open === 0 ? 'up' : 'neu';
  const open_tag_lbl = lb_open == null ? '—' : lb_open === 0 ? 'FULLY BOOKED' : `${Math.round(lb_open)} OPEN`;
  let openSub;
  if (wh_wd_open == null && wh_we_open == null) {
    openSub = `<span style="color:var(--mu)">No WH rate data — split unavailable</span>`;
  } else {
    openSub = `Open weekday <b>${wh_wd_open ?? '—'}</b><span class="sep">·</span>Open weekend <b>${wh_we_open ?? '—'}</b>${mismatchNote}`;
  }
  const kpi_open = `
    <div class="kpi-sq">
      <span class="kpi-tag ${open_tag_cls}">${open_tag_lbl}</span>
      <div>
        <div class="kpi-lbl">${state.popupMonth} Open Nights</div>
        <div class="kpi-big">${lb_open==null?'—':fmtNum(lb_open)}</div>
      </div>
      <div class="kpi-sub">${openSub}</div>
    </div>`;

  // ─── KPI 4: Revenue Gap to EOM (eom_rev - rev_cy); small: CY rev vs SDLY rev
  const eom_rev = m.eom_rev;
  const cy_rev = m.rev_cy;
  const sdly_rev = m.rev_sdly;
  const gapToEom = (eom_rev != null && cy_rev != null) ? (cy_rev - eom_rev) : null;
  // gapToEom > 0 means CY ahead of LY EOM target (good). < 0 means behind (bad).
  const gap_tag_cls = gapToEom == null ? 'neu' : gapToEom >= 0 ? 'up' : 'dn';
  const gap_tag_lbl = gapToEom == null ? 'NO DATA' : gapToEom >= 0 ? 'AHEAD OF LY' : 'BEHIND LY';
  const gapBig = gapToEom == null
    ? '<span class="neu">—</span>'
    : `<span class="${cls(gapToEom)}">${fmtSign$(gapToEom)}</span>`;
  const kpi_gap = `
    <div class="kpi-sq">
      <span class="kpi-tag ${gap_tag_cls}">${gap_tag_lbl}</span>
      <div>
        <div class="kpi-lbl">${state.popupMonth} CY Rev vs LY EOM Target</div>
        <div class="kpi-big">${gapBig}</div>
      </div>
      <div class="kpi-sub">CY <b>${fmt$0(cy_rev)}</b><span class="sep">·</span>SDLY <b>${fmt$0(sdly_rev)}</b><span class="sep">·</span>EOM <b>${fmt$0(eom_rev)}</b></div>
    </div>`;

  // ─── Active flags strip for this month
  const flagBadges = (m.flags||[]).map(f=>`<span class="fbadge ${FLAG_CLASS[f]}">${f}</span>`).join('') || '<span style="color:var(--mu);font-size:.65rem">No flags this month</span>';

  // ─── Optional: explainer paragraph
  const explain = `
    <div class="m-explain">
      <b>Req Rate to EOM</b> = (LY end-of-month revenue − CY booked revenue) / open nights — what you'd need to charge each remaining night to match last year's final.
      <code>"Ahead"</code> = already past last year's EOM. A dash means we don't have enough data to compute it (no EOM target, no open nights, or WH rate file missing).
      WH Weekday/Weekend can be missing while Req Rate is shown, because Req Rate comes from leaderboard data and WH columns come from the rates file — those don't always overlap.
    </div>`;

  // ─── Reference table (compact 4-month view at bottom, small)
  const fwdRows = u.fwd_months.map(fm=>{
    const isActive = fm.month === state.popupMonth;
    return `<tr ${isActive?'style="background:var(--ac3)"':''}>
      <td class="lbl"><b>${fm.month}</b></td>
      <td>${fmt$0(fm.rev_cy)} <span style="color:var(--mu)">/ ${fmt$0(fm.rev_sdly)}</span></td>
      <td>${fmtPct(fm.occ_cy)} <span style="color:var(--mu)">/ ${fmtPct(fm.occ_sdly)}</span></td>
      <td>${fmtRate(fm.adr_cy)} <span style="color:var(--mu)">/ ${fmtRate(fm.adr_sdly)}</span></td>
      <td>${fm.open_nts==null?'—':Math.round(fm.open_nts)}</td>
      <td>${fm.req_rate_eom==null?'—':(fm.req_rate_eom===0?'<span class="pos">Ahead</span>':fmtRate(fm.req_rate_eom))}</td>
      <td>${fm.wh_blended==null?'—':fmtRate(fm.wh_blended)}</td>
      <td>${(fm.flags||[]).length}</td>
    </tr>`;
  }).join('');

  // ─── Damage rollup mini-summary
  const damageRow = `
    <table class="m-table" style="margin-top:14px">
      <thead><tr>
        <th>Jan–Apr Rollup</th><th>CY Rev</th><th>SDLY Rev</th><th>Rev Δ</th><th>OCC Δ</th><th>ADR Δ</th><th>Net Position</th>
      </tr></thead>
      <tbody><tr>
        <td><b>4-month</b></td>
        <td>${fmt$0(u.ana_rev_cy)}</td>
        <td>${fmt$0(u.ana_rev_sdly)}</td>
        <td class="${cls(u.ana_rev_diff)}"><b>${fmtSign$(u.ana_rev_diff)}</b></td>
        <td class="${cls(u.ana_occ_diff)}"><b>${fmtSignPct(u.ana_occ_diff)}</b></td>
        <td class="${cls(u.ana_adr_diff)}"><b>${u.ana_adr_diff==null?'—':((u.ana_adr_diff>=0?'+':'-')+'$'+Math.abs(Math.round(u.ana_adr_diff)))}</b></td>
        <td class="${cls(u.net_position)}"><b>${fmtSign$(u.net_position)}</b></td>
      </tr></tbody>
    </table>`;

  // ─── Build final
  document.getElementById('mContent').innerHTML = `
    <div class="mh">
      <div class="mh-l">
        <h2>${u.unit}${u.bedrooms!=null?` <span style="font-size:.85rem;color:var(--mu);font-weight:500;letter-spacing:0">${u.bedrooms}BR</span>`:''}</h2>
        <div class="mh-meta">
          ${sevBadge}
          ${ldgChip}
          ${u.name ? `<span><b>${u.name}</b></span>` : ''}
        </div>
        ${tags ? `<div style="margin-top:8px">${tags}</div>` : ''}
      </div>
      <div class="mh-r">
        <button class="mclose" id="mClose">×</button>
        <div class="m-month" id="mMonth">
          ${['MAY','JUN','JUL','AUG'].map(mn=>`<button class="${state.popupMonth===mn?'act':''}" data-pm="${mn}">${mn}</button>`).join('')}
        </div>
      </div>
    </div>

    <div class="m-section-title">${state.popupMonth} 2026 KPIs</div>
    <div class="mkpi">
      ${kpi_occ}
      ${kpi_rate}
      ${kpi_open}
      ${kpi_gap}
    </div>

    <div class="m-section-title">Active Flags · ${state.popupMonth}</div>
    <div class="m-flagstrip">${flagBadges}</div>

    ${explain}

    <div class="m-section-title">All Forward Months · CY / SDLY</div>
    <table class="m-table">
      <thead><tr>
        <th>Mo</th><th>Rev (CY/LY)</th><th>OCC (CY/LY)</th><th>ADR (CY/LY)</th><th>Open</th><th>Req Rate</th><th>WH Blended</th><th>Flags</th>
      </tr></thead>
      <tbody>${fwdRows}</tbody>
    </table>

    ${damageRow}
  `;

  document.getElementById('mClose').onclick = closeUnitPopup;
  document.querySelectorAll('#mMonth button').forEach(b=>{
    b.onclick = ()=>{ state.popupMonth = b.dataset.pm; renderPopup(); };
  });
}

// Backdrop click to close + Esc key
document.getElementById('mbd').addEventListener('click', (e)=>{
  if (e.target.id === 'mbd') closeUnitPopup();
});
document.addEventListener('keydown', (e)=>{
  if (e.key === 'Escape' && state.popupUnit) closeUnitPopup();
});

/* ──────────────────────────────────────────────────────────────────────
   TAB MANAGEMENT
   ────────────────────────────────────────────────────────────────────── */
function setTab(tab){
  state.tab = tab;
  // auto-switch preset
  if(tab==='rate'){
    applyPreset('Rate');
  } else {
    if(state.preset==='Rate' || !PRESETS[state.preset]) applyPreset('Revenue');
    else applyPreset(state.preset);
  }
  // reset scorecard filter on tab change
  state.scorecard = null;
  // reset sort
  state.sortKey = 'sev_rank';
  state.sortDir = 'desc';
  renderAll();
}

document.querySelectorAll('.tab').forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('act'));
    t.classList.add('act');
    setTab(t.dataset.tab);
  };
});

/* ──────────────────────────────────────────────────────────────────────
   MAIN RENDER
   ────────────────────────────────────────────────────────────────────── */
function renderAll(){
  renderSevStrip();
  renderMonthToggle();
  renderScorecards();
  renderFilters();
  renderColPicker();
  renderTable();
}


/* ──────────────────────────────────────────────────────────────────────
   EXCEL EXPORT
   ────────────────────────────────────────────────────────────────────── */
function exportToExcel(){
  const rows = applyTableFilters().slice();
  rows.sort((a,b)=>{
    const k = state.sortKey;
    let va, vb;
    const m = state.tab !== 'damage' ? state.month : null;
    const fma = m ? a.fwd_months.find(x=>x.month===m) : null;
    const fmb = m ? b.fwd_months.find(x=>x.month===m) : null;
    if (k === 'sev_rank') { va = a.sev_rank; vb = b.sev_rank; }
    else if (k === 'unit') { va = a.unit; vb = b.unit; }
    else if (k === 'bedrooms') { va = a.bedrooms; vb = b.bedrooms; }
    else if (COLS[k]) { va = COLS[k].key(a, fma); vb = COLS[k].key(b, fmb); }
    else { va = a[k]; vb = b[k]; }
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return state.sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return state.sortDir === 'asc' ? va - vb : vb - va;
  });

  const md = state.tab !== 'damage' ? state.month : null;
  const headers = [
    'Unit','BR','Severity','Primary LDG','Tags','Name',
    'Active Flags','Flag Count',
    'CY Rev','SDLY Rev','Rev Diff',
    'CY OCC %','SDLY OCC %','OCC Diff (pp)',
    'CY ADR','SDLY ADR','ADR Diff',
    'Open Nts','Guest Nts',
    'EOM Rev Target','EOM ADR (LY)',
    'WH Weekday','WH Weekend','WH Blended',
    'Open WD (WH)','Open WE (WH)',
    'Req Rate to EOM','Net Position'
  ];
  const data = [headers];
  rows.forEach(r=>{
    const fm = md ? r.fwd_months.find(x=>x.month===md) : null;
    const flags = state.tab === 'damage' ? r.all_flags : (fm?fm.flags:[]);
    const flagCount = state.tab === 'damage' ? r.total_flag_count : (fm?fm.flag_count:0);
    const reqRate = fm ? fm.req_rate_eom : null;
    data.push([
      r.unit, r.bedrooms, r.severity || '', r.primary_ldg || '',
      (r.tags||[]).join('; '), r.name||'',
      (flags||[]).join('; '), flagCount,
      fm?fm.rev_cy:r.ana_rev_cy,
      fm?fm.rev_sdly:r.ana_rev_sdly,
      fm?fm.rev_diff:r.ana_rev_diff,
      fm?fm.occ_cy:r.ana_occ_cy,
      fm?fm.occ_sdly:r.ana_occ_sdly,
      fm?fm.occ_diff:r.ana_occ_diff,
      fm?fm.adr_cy:r.ana_adr_cy,
      fm?fm.adr_sdly:r.ana_adr_sdly,
      fm?fm.adr_diff:r.ana_adr_diff,
      fm?fm.open_nts:r.ana_open,
      fm?fm.gn_cy:r.ana_gn_cy,
      fm?fm.eom_rev:'',
      fm?fm.eom_adr:'',
      fm?fm.wh_wd:'',
      fm?fm.wh_we:'',
      fm?fm.wh_blended:'',
      fm?fm.wh_open_wd:'',
      fm?fm.wh_open_we:'',
      reqRate === 0 ? 'Ahead' : (reqRate==null?'':reqRate),
      r.net_position
    ]);
  });

  if (typeof XLSX === 'undefined') {
    alert('Excel library failed to load. Check connection and reload.');
    return;
  }
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = headers.map((h,i)=>{
    const lens = data.map(rr => String(rr[i]==null?'':rr[i]).length);
    const maxLen = Math.max(...lens);
    return {wch: Math.min(Math.max(maxLen+2, 8), 40)};
  });
  ws['!freeze'] = {xSplit: 0, ySplit: 1};

  const wb = XLSX.utils.book_new();
  const tabName = state.tab === 'damage' ? 'Damage_JanApr' :
                  state.tab === 'forward' ? 'Forward_'+state.month :
                  'Rate_'+state.month;
  XLSX.utils.book_append_sheet(wb, ws, tabName);
  const stamp = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb, 'IslandTime_Underperformers_'+tabName+'_'+stamp+'.xlsx');
}

// Init
applyPreset('Revenue');
state.sortKey = 'ana_rev_diff';
state.sortDir = 'asc';
renderAll();

document.getElementById('exportXlsx').onclick = exportToExcel;
</script>
